services:
  oracle:
    build: .
    image: slime-oracle:latest
    container_name: slime-oracle
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - slime-memory:/data
    environment:
      SLIME_LAT: "33.4484"
      SLIME_LON: "-112.0740"
      SLIME_TZ: "America/Phoenix"
      # ORACLE_TOKEN: "set-a-shared-token-to-require-auth"
      # GitHub presence: put GITHUB_USER / GITHUB_TOKEN in a gitignored server/.env
      # (compose auto-loads it for these interpolations). Empty -> presence stays "idle".
      GITHUB_USER: "${GITHUB_USER:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # Calendar presence: put CALENDAR_ICS_URL (Google private iCal secret address) in
      # the same gitignored server/.env. Empty -> calendar block omitted from /oracle.
      CALENDAR_ICS_URL: "${CALENDAR_ICS_URL:-}"
      # Inbox presence: put IMAP_HOST / IMAP_USER / IMAP_PASSWORD (an APP password for
      # Gmail) in the gitignored server/.env. Empty -> inbox block omitted from /oracle.
      IMAP_HOST: "${IMAP_HOST:-}"
      IMAP_USER: "${IMAP_USER:-}"
      IMAP_PASSWORD: "${IMAP_PASSWORD:-}"
      # LLM dreams: DREAM_PROVIDER = "ollama" or "anthropic" (empty -> template dreams only).
      # Ollama: set OLLAMA_URL/OLLAMA_MODEL. Anthropic: set ANTHROPIC_API_KEY/ANTHROPIC_MODEL.
      DREAM_PROVIDER: "${DREAM_PROVIDER:-}"
      OLLAMA_URL: "${OLLAMA_URL:-http://localhost:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-haiku-4-5}"
      DREAM_MAX_CHARS: "${DREAM_MAX_CHARS:-120}"
      MEMORY_PATH: "${MEMORY_PATH:-/data/memory.jsonl}"
      MEMORY_CAP: "${MEMORY_CAP:-365}"

volumes:
  slime-memory:
