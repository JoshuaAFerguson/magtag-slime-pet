services:
  oracle:
    build: .
    image: slime-oracle:latest
    container_name: slime-oracle
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SLIME_LAT: "33.4484"
      SLIME_LON: "-112.0740"
      SLIME_TZ: "America/Phoenix"
      # ORACLE_TOKEN: "set-a-shared-token-to-require-auth"
      # GitHub presence: put GITHUB_USER / GITHUB_TOKEN in a gitignored server/.env
      # (compose auto-loads it for these interpolations). Empty -> presence stays "idle".
      GITHUB_USER: "${GITHUB_USER:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # Calendar presence: put CALENDAR_ICS_URL (Google private iCal secret address) in
      # the same gitignored server/.env. Empty -> calendar block omitted from /oracle.
      CALENDAR_ICS_URL: "${CALENDAR_ICS_URL:-}"
      # Inbox presence: put IMAP_HOST / IMAP_USER / IMAP_PASSWORD (an APP password for
      # Gmail) in the gitignored server/.env. Empty -> inbox block omitted from /oracle.
      IMAP_HOST: "${IMAP_HOST:-}"
      IMAP_USER: "${IMAP_USER:-}"
      IMAP_PASSWORD: "${IMAP_PASSWORD:-}"
